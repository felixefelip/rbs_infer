---
version: 1
methods:
  Column#set_default_user_name:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: board
    enforced: false
  Comment#author_name:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: user
  Comment#short_body:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: body
  Post#author_name:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: user
  Post::Notifiable#notification_payload:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: user
    enforced: false
  ProfileFormatter#format_nickname:
    requires:
    - kind: not_nil
      expr:
        kind: send
        receiver:
          kind: self
        method: nickname
    enforced: false
