version: 1
postconditions:
- class: ActionController::Base
  method: head
  unconditional:
    ivars:
      "@__rbs_infer__performed": 'true'
    self: "::ActionController::Base & ::ActionController::Base::AfterHead"
  effects:
    may_write:
    - "@__rbs_infer__performed"
- class: ActionController::Base
  method: performed?
