    may_write:
    - "@__rbs_infer__performed"
  conditional_returns:
    current_user:
      gate_ivar: "@__rbs_infer__performed"
      type: "(::User & ::User::Validated)"
  conditional_const_returns:
    Current.author_name:
      gate_ivar: "@__rbs_infer__performed"
      type: "::String"
    Current.user:
      gate_ivar: "@__rbs_infer__performed"
      type: "(::User & ::User::Validated)"
